name: SonarQube PR Analysis

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: read

concurrency:
  group: sonar-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    name: Unity Coverage and Sonar
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Validate CI secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SONAR_TOKEN:-}" ]; then
            echo "SONAR_TOKEN is required for SonarQube analysis." >&2
            exit 1
          fi

          if [ -z "${UNITY_LICENSE:-}" ] && { [ -z "${UNITY_EMAIL:-}" ] || [ -z "${UNITY_PASSWORD:-}" ]; }; then
            echo "Provide UNITY_LICENSE or UNITY_EMAIL and UNITY_PASSWORD so Unity tests can run in CI." >&2
            echo "If this repository is using a Unity Personal license and email/password activation fails, add UNITY_LICENSE and rerun the workflow." >&2
            exit 1
          fi

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt', 'Assets/**/*.asmdef') }}
          restore-keys: |
            Library-${{ runner.os }}-

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Clean old coverage artifacts
        shell: bash
        run: |
          set -euo pipefail
          rm -rf CodeCoverage artifacts/test-results

      - name: Run Unity tests with coverage
        id: unity-tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: .
          testMode: All
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: Unity Test Results
          artifactsPath: artifacts/test-results
          coverageOptions: generateAdditionalMetrics;generateAdditionalReports;generateHtmlReport;generateBadgeReport;assemblyFilters:+Assembly-CSharp,+Tests.*,-Unity.*;pathFilters:+Assets/Scripts/**,+Assets/*.cs,-Assets/Tests/**,-Assets/**/Tests/**,-**/Editor/**,-**/Plugins/**;pathReplacePatterns:/github/workspace/,${{ github.workspace }}/;sourcePaths:${{ github.workspace }}
          customParameters: -enableCodeCoverage -debugCodeOptimization -coverageResultsPath CodeCoverage -coverageHistoryPath CodeCoverage/Report-history

      - name: Prepare coverage outputs
        shell: bash
        run: |
          set -euo pipefail

          coverage_path='${{ steps.unity-tests.outputs.coveragePath }}'
          if [ -z "$coverage_path" ]; then
            echo "unity-test-runner did not report a coveragePath output." >&2
            exit 1
          fi

          if [ ! -e "$coverage_path" ]; then
            echo "Coverage output path does not exist: $coverage_path" >&2
            exit 1
          fi

          if find CodeCoverage -type f -name 'TestCoverageResults_*.xml' -print -quit 2>/dev/null | grep -q .; then
            exit 0
          fi

          case "$coverage_path" in
            CodeCoverage|CodeCoverage/*)
              echo "Coverage output path is already inside CodeCoverage: $coverage_path"
              ;;
            *)
              rm -rf CodeCoverage
              mkdir -p CodeCoverage
              if [ -d "$coverage_path" ]; then
                sudo cp -a "$coverage_path"/. CodeCoverage/
              else
                sudo cp -a "$coverage_path" CodeCoverage/
              fi
              sudo chown -R "$USER:$USER" CodeCoverage
              ;;
          esac

      - name: Validate coverage outputs
        shell: bash
        run: |
          set -euo pipefail

          coverage_path='${{ steps.unity-tests.outputs.coveragePath }}'
          search_roots=(CodeCoverage)
          if [ -n "$coverage_path" ]; then
            search_roots+=("$coverage_path")
            search_roots+=("$(dirname "$coverage_path")")
          fi

          reports=$(find "${search_roots[@]}" -type f \( -name 'TestCoverageResults*.xml' -o -name '*OpenCover*.xml' -o -name '*opencover*.xml' \) -printf '%T@ %p\n' 2>/dev/null | sort -n | awk '!seen[$2]++ {print $2}')
          if [ -z "$reports" ]; then
            echo "Unity did not produce any OpenCover coverage XML files under CodeCoverage/." >&2
            echo "Searched roots: ${search_roots[*]}" >&2
            find "${search_roots[@]}" -maxdepth 3 -type f 2>/dev/null | sort >&2 || true
            exit 1
          fi

          first_report=$(printf '%s\n' "$reports" | tail -n 1)
          if ! grep -Fq "fullPath=\"${GITHUB_WORKSPACE}/" "$first_report"; then
            echo "Coverage XML paths do not resolve to the GitHub workspace, so Sonar would skip coverage import." >&2
            echo "First report checked: $first_report" >&2
            grep -m 5 'fullPath=' "$first_report" >&2 || true
            exit 1
          fi

          summary_file=''
          for candidate in \
            CodeCoverage/Report/Summary.xml \
            "$coverage_path/Report/Summary.xml" \
            "$coverage_path/Summary.xml" \
            "$(dirname "$coverage_path")/Report/Summary.xml" \
            "$(dirname "$coverage_path")/Summary.xml"
          do
            if [ -f "$candidate" ]; then
              summary_file="$candidate"
              break
            fi
          done

          if [ -z "$summary_file" ]; then
            echo "Unity did not produce CodeCoverage/Report/Summary.xml." >&2
            exit 1
          fi

      - name: Upload Unity test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results
          path: artifacts/test-results
          if-no-files-found: warn

      - name: Upload Unity coverage results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-coverage
          path: CodeCoverage
          if-no-files-found: warn

      - name: Cache Sonar packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: .