name: SonarQube Cloud PR Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  sonar:
    name: Build and Analyze
    runs-on: windows-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io
      SONAR_ORG: questionxble
      SONAR_PROJECT_KEY: Questionxble_2dgameproject

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Sonar Token
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("$env:SONAR_TOKEN")) {
            Write-Error "SONAR_TOKEN is missing. Add it in GitHub -> Settings -> Secrets and variables -> Actions."
            exit 1
          }

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install SonarScanner for .NET
        shell: pwsh
        run: |
          dotnet tool update --global dotnet-sonarscanner
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Sonar Begin
        shell: pwsh
        run: |
          dotnet-sonarscanner begin `
            /k:"$env:SONAR_PROJECT_KEY" `
            /o:"$env:SONAR_ORG" `
            /d:sonar.token="$env:SONAR_TOKEN" `
            /d:sonar.host.url="$env:SONAR_HOST_URL" `
            /d:sonar.sources="Assets,Packages,ProjectSettings" `
            /d:sonar.tests="Assets/Tests" `
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/*.opencover.xml" `
            /d:sonar.exclusions="**/Library/**,**/Temp/**,**/Logs/**,**/CodeCoverage/**,**/obj/**,**/bin/**"

      - name: Build Solution
        shell: pwsh
        run: |
          dotnet build 2dgameproject.sln --no-incremental

      - name: Run EditMode Tests with Coverage
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "TestResults" -Force | Out-Null
          if (Test-Path "Tests.EditMode.csproj") {
            dotnet test Tests.EditMode.csproj --no-build `
              /p:CollectCoverage=true `
              /p:CoverletOutputFormat=opencover `
              /p:CoverletOutput=./TestResults/coverage.editmode.opencover.xml
          } else {
            Write-Warning "Tests.EditMode.csproj not found; skipping EditMode coverage."
          }

      - name: Run Editor Tests with Coverage
        shell: pwsh
        run: |
          if (Test-Path "Tests.Editor.csproj") {
            dotnet test Tests.Editor.csproj --no-build `
              /p:CollectCoverage=true `
              /p:CoverletOutputFormat=opencover `
              /p:CoverletOutput=./TestResults/coverage.editor.opencover.xml
          } else {
            Write-Warning "Tests.Editor.csproj not found; skipping Editor coverage."
          }

      - name: Run PlayMode Tests with Coverage
        shell: pwsh
        run: |
          if (Test-Path "Tests.PlayMode.csproj") {
            dotnet test Tests.PlayMode.csproj --no-build `
              /p:CollectCoverage=true `
              /p:CoverletOutputFormat=opencover `
              /p:CoverletOutput=./TestResults/coverage.playmode.opencover.xml
          } else {
            Write-Warning "Tests.PlayMode.csproj not found; skipping PlayMode coverage."
          }

      - name: Sonar End
        shell: pwsh
        run: |
          dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"